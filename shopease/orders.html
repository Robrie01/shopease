<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ShopEase — My Orders</title>
<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/components.css">
<style>
.order-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r3);margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);overflow:hidden;}
.order-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px;}
.order-id{font-weight:700;color:var(--accent);font-size:.9rem;}
.order-date{font-size:.75rem;color:var(--t3);}
.order-status{font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:20px;background:rgba(79,126,247,.1);color:var(--accent);}
.order-status.processing{background:rgba(245,158,11,.12);color:#d97706;}
.order-status.delivered{background:rgba(16,185,129,.12);color:var(--green);}
.order-items{padding:12px 18px;border-bottom:1px solid var(--border);}
.order-item{display:flex;align-items:center;justify-content:space-between;padding:5px 0;font-size:.83rem;color:var(--text);}
.order-item-name{display:flex;align-items:center;gap:7px;}
.order-item-price{color:var(--t2);font-size:.8rem;}
.order-foot{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:var(--card2);}
.order-del{font-size:.75rem;color:var(--t2);}
.order-total{font-size:.88rem;font-weight:700;color:var(--text);}
.empty-state{text-align:center;padding:60px 20px;color:var(--t3);}
.empty-state .eico{font-size:2.5rem;margin-bottom:12px;}
.empty-state p{font-size:.83rem;margin-bottom:16px;}
</style>
</head>
<body>
<div id="toasts"></div>
<div id="topnav"></div>
<div class="wrap">
<div id="sidebar"></div>
<main class="main">
  <div class="page-title">My Orders</div>
  <div id="order-list"></div>
</main>
</div>
<script src="js/state.js"></script>
<script src="js/nav.js"></script>
<script>
const user=Nav.init({page:'orders'});
const orders=user&&user.email?State.getOrders(user.email):[];
const list=document.getElementById('order-list');

if(!orders.length){
  list.innerHTML='<div class="empty-state"><div class="eico">📋</div><p>You have no orders yet.</p><a href="shop.html" class="btn btn-p btn-sm">Start Shopping</a></div>';
}else{
  const DL={standard:'Standard (3-5 days)',express:'Express (next day)',free:'Free Delivery (5-7 days)'};
  list.innerHTML=orders.map(o=>{
    const d=new Date(o.created);
    const ds=d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
    const statusClass=o.status==='Processing'?'processing':'delivered';
    const itemsHtml=o.items.map(i=>'<div class="order-item"><span class="order-item-name"><span>'+i.emoji+'</span><span>'+i.name+(i.qty>1?' &times;'+i.qty:'')+'</span></span><span class="order-item-price">£'+(i.price*i.qty).toFixed(2)+'</span></div>').join('');
    return '<div class="order-card"><div class="order-hdr"><div><span class="order-id">'+o.id+'</span><div class="order-date" style="margin-top:2px;">'+ds+'</div></div><span class="order-status '+statusClass+'">'+o.status+'</span></div><div class="order-items">'+itemsHtml+'</div><div class="order-foot"><span class="order-del">'+( DL[o.delivery]||o.delivery)+'</span><span class="order-total">Total: £'+o.total.toFixed(2)+'</span></div></div>';
  }).join('');
}
</script>
</body>
</html>
