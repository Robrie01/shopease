<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ShopEase — Catalogue</title>
<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/components.css">
</head>
<body>
<div id="toasts"></div>
<div id="topnav"></div>
<div class="wrap">
<div id="sidebar"></div>
<main class="main">
  <div id="rv-sec" style="display:none;margin-bottom:20px;">
    <div style="font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--t3);margin-bottom:9px;">Recently Viewed</div>
    <div class="rvstrip" id="rvstrip"></div>
    <div class="hr"></div>
  </div>
  <div class="sec-hdr">
    <div class="page-title" style="margin:0;">Catalogue</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <div style="position:relative;">
        <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:.82rem;pointer-events:none;">⌕</span>
        <input type="text" id="srch" placeholder="Search products..." style="padding-left:29px;width:210px;" oninput="filt()">
      </div>
      <select id="cat" style="width:auto;padding:9px 12px;" onchange="filt()">
        <option value="">All Categories</option>
        <option>Electronics</option><option>Fashion</option><option>Home</option><option>Fitness</option>
      </select>
      <select id="srt" style="width:auto;padding:9px 12px;" onchange="filt()">
        <option value="">Sort: Default</option>
        <option value="pa">Price: Low &#8594; High</option>
        <option value="pd">Price: High &#8594; Low</option>
        <option value="n">Name A&#8211;Z</option>
        <option value="s">In Stock First</option>
      </select>
    </div>
  </div>
  <div style="font-size:.74rem;color:var(--t3);margin-bottom:12px;" id="rinfo"></div>
  <div class="pgrid" id="pgrid"></div>
</main>
</div>
<script src="js/state.js"></script>
<script src="js/nav.js"></script>
<script>
Nav.init({page:'shop'});
function pimg(p){return p.image?'<img src="'+p.image+'" class="pimg" alt="'+p.name+'">':'<span class="pemo">'+p.emoji+'</span>';}
function stars(n){return '<span style="color:var(--yellow);">'+'★'.repeat(Math.floor(n))+'☆'.repeat(5-Math.floor(n))+'</span> <span style="color:var(--t3);font-size:.67rem;">'+n+'</span>';}
function stag(s){if(s===0)return'<span class="stag sout">Out of stock</span>';if(s<=5)return'<span class="stag slow">Only '+s+' left</span>';return'<span class="stag sin">In stock</span>';}
function render(list){
  const wl=State.getWL();
  document.getElementById('rinfo').textContent=list.length+' product'+(list.length!==1?'s':'')+' found';
  const g=document.getElementById('pgrid');
  if(!list.length){g.innerHTML='<div class="empty" style="grid-column:1/-1"><div class="ei">◫</div><p>No products found. <a onclick="clr()">Clear filters</a></p></div>';return;}
  g.innerHTML=list.map(p=>'<div class="pcard"><button class="wlbtn'+(wl.includes(p.id)?' on':'')+'" onclick="twl('+p.id+',\''+p.name+'\')" title="Wishlist">'+(wl.includes(p.id)?'♥':'♡')+'</button>'+pimg(p)+'<div class="pname">'+p.name+'</div><div class="pcat">'+p.cat+'</div><div class="pstars">'+stars(p.stars)+' <span style="color:var(--t3);font-size:.67rem;">'+p.reviews.toLocaleString()+' reviews</span></div>'+stag(p.stock)+'<div class="pprice">£'+p.price.toFixed(2)+' <span class="vat">inc. VAT</span></div><button class="btn btn-d btn-full btn-sm" onclick="add('+p.id+')" '+(p.stock===0?'disabled':'')+'>'+(p.stock===0?'Out of Stock':'+ Add to Cart')+'</button></div>').join('');
}
function filt(){
  const q=document.getElementById('srch').value.toLowerCase(),cat=document.getElementById('cat').value,srt=document.getElementById('srt').value;
  if(q)State.track('search',{query:q});
  let list=State.getProds().filter(p=>(!q||p.name.toLowerCase().includes(q)||p.cat.toLowerCase().includes(q))&&(!cat||p.cat===cat));
  if(srt==='pa')list.sort((a,b)=>a.price-b.price);
  else if(srt==='pd')list.sort((a,b)=>b.price-a.price);
  else if(srt==='n')list.sort((a,b)=>a.name.localeCompare(b.name));
  else if(srt==='s')list.sort((a,b)=>b.stock-a.stock);
  render(list);
}
function clr(){document.getElementById('srch').value='';document.getElementById('cat').value='';document.getElementById('srt').value='';filt();}
function add(id){const p=State.getProds().find(x=>x.id===id);if(!p)return;State.addRecent(id);const ok=State.addToCart(p);Nav.toast(ok?p.emoji+' '+p.name+' added to cart':'No more stock available',ok?'s':'e');filt();renderRV();}
function twl(id,name){State.toggleWL(id,name);Nav.toast(State.getWL().includes(id)?'Added to wishlist':'Removed from wishlist','i');filt();}
function renderRV(){const rv=State.getRecent();const sec=document.getElementById('rv-sec');if(!rv.length){sec.style.display='none';return;}sec.style.display='block';document.getElementById('rvstrip').innerHTML=rv.map(id=>{const p=State.getProds().find(x=>x.id===id);if(!p)return'';return'<div class="rvcard" onclick="add('+p.id+')"><div class="rve">'+p.emoji+'</div><p>'+p.name+'</p><div class="rvp">£'+p.price.toFixed(2)+'</div></div>';}).join('');}
filt();renderRV();
</script>
</body>
</html>
