<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ShopEase Admin — Analytics</title>
<link rel="stylesheet" href="../css/global.css">
<link rel="stylesheet" href="../css/components.css">
<style>
.bar-chart{display:flex;align-items:flex-end;gap:7px;height:100px;}
.bc{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.b{border-radius:4px 4px 0 0;min-height:4px;transition:opacity .2s;width:100%;}
.b:hover{opacity:.72;}
.bl{font-size:.63rem;color:var(--t3);}
.bls{display:flex;gap:7px;}
.efeed{max-height:200px;overflow-y:auto;}
.ei2{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--border);gap:7px;}
.ei2:last-child{border:none;}
</style>
</head>
<body>
<div id="toasts"></div>
<div id="topnav"></div>
<div class="wrap">
<div id="sidebar"></div>
<main class="main">
  <div class="sec-hdr">
    <div class="page-title" style="margin:0;">Analytics</div>
    <div style="display:flex;gap:7px;align-items:center;">
      <span style="font-size:.73rem;color:var(--t3);" id="ats"></span>
      <button class="btn btn-d btn-sm" onclick="go()">&#8635; Refresh</button>
      <button class="btn btn-r btn-sm" onclick="if(confirm('Clear all analytics?')){State.clearEvts();go();Nav.toast('Analytics cleared.','i');}">Clear</button>
    </div>
  </div>
  <div class="kgrid" id="kg"></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
    <div class="card"><div style="font-size:.83rem;font-weight:600;margin-bottom:14px;">Revenue — Last 7 Days</div><div class="bar-chart" id="rc"></div><div class="bls" id="rl"></div></div>
    <div class="card"><div style="font-size:.83rem;font-weight:600;margin-bottom:14px;">Orders — Last 7 Days</div><div class="bar-chart" id="oc"></div><div class="bls" id="ol"></div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
    <div class="card"><div style="font-size:.83rem;font-weight:600;margin-bottom:13px;">Top Products by Cart Adds</div><div id="tp"></div></div>
    <div class="card"><div style="font-size:.83rem;font-weight:600;margin-bottom:13px;">Recent Events</div><div class="efeed" id="ef"></div></div>
  </div>
</main>
</div>
<script src="../js/state.js"></script>
<script src="../js/nav.js"></script>
<script>
Nav.init({page:'analytics',adminOnly:true});
function go(){
  const evts=State.getEvts(),now=Date.now();
  const ses=evts.filter(e=>e.type==='session').length;
  const pvs=evts.filter(e=>e.type==='page_view').length;
  const purch=evts.filter(e=>e.type==='purchase');
  const rev=purch.reduce((a,e)=>a+(e.data.total||0),0);
  const conv=ses>0?((purch.length/ses)*100).toFixed(1):'0.0';
  const avg=purch.length>0?(rev/purch.length):0;
  const wla=evts.filter(e=>e.type==='wl_add').length;
  const srch=evts.filter(e=>e.type==='search').length;
  const kpis=[{v:ses,l:'Sessions'},{v:pvs,l:'Page Views'},{v:'£'+rev.toFixed(2),l:'Revenue'},{v:purch.length,l:'Orders'},{v:conv+'%',l:'Conv. Rate'},{v:'£'+avg.toFixed(2),l:'Avg Order'},{v:wla,l:'Wishlist Adds'},{v:srch,l:'Searches'}];
  document.getElementById('kg').innerHTML=kpis.map(k=>'<div class="kcard"><div class="kval">'+k.v+'</div><div class="klbl">'+k.l+'</div></div>').join('');
  function l7(type,getV){const labels=[],values=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const ds=new Date(d);ds.setHours(0,0,0,0);const de=new Date(d);de.setHours(23,59,59,999);const lb=d.toLocaleDateString('en-GB',{weekday:'short'});const fi=evts.filter(e=>e.type===type&&e.ts>=ds.getTime()&&e.ts<=de.getTime());labels.push(lb);values.push(fi.reduce((a,e)=>a+(getV?getV(e):1),0));}return{labels,values};}
  function bar(cid,lid,vals,lbls,col){const mx=Math.max(...vals,1);document.getElementById(cid).innerHTML=vals.map(v=>'<div class="bc"><div class="b" style="height:'+((v/mx*96)+4)+'px;background:'+col+';" title="'+v+'"></div></div>').join('');document.getElementById(lid).innerHTML=lbls.map(l=>'<div class="bl" style="flex:1;text-align:center;">'+l+'</div>').join('');}
  const r7=l7('purchase',e=>e.data.total||0);bar('rc','rl',r7.values,r7.labels,'linear-gradient(to top,var(--accent),#93c5fd)');
  const o7=l7('purchase');bar('oc','ol',o7.values,o7.labels,'linear-gradient(to top,var(--green),#86efac)');
  const pc={};evts.filter(e=>e.type==='add_to_cart').forEach(e=>{const k=e.data.name;pc[k]=(pc[k]||0)+1;});
  const sorted=Object.entries(pc).sort((a,b)=>b[1]-a[1]).slice(0,6);
  document.getElementById('tp').innerHTML=sorted.length?sorted.map(([n,c],i)=>'<div style="display:flex;align-items:center;gap:9px;padding:5px 0;border-bottom:1px solid var(--border);"><span style="font-size:.73rem;color:var(--t3);min-width:13px;">'+(i+1)+'</span><div style="flex:1;font-size:.82rem;font-weight:600;">'+n+'</div><span style="font-size:.79rem;color:var(--accent);font-weight:700;">'+c+'</span><div style="height:4px;width:'+Math.round((c/sorted[0][1])*50)+'px;background:var(--accent);border-radius:2px;"></div></div>').join(''):'<div style="color:var(--t3);font-size:.8rem;">No cart activity yet.</div>';
  const EL={session:'Session started',page_view:'Page view',search:'Search',add_to_cart:'Added to cart',remove:'Removed',purchase:'Purchase',wl_add:'Wishlisted',cookie_consent:'Cookie consent'};
  const recent=[...evts].reverse().slice(0,40);
  document.getElementById('ef').innerHTML=recent.length?recent.map(e=>'<div class="ei2"><div><div style="font-size:.79rem;font-weight:600;">'+((EL[e.type])||e.type)+'</div><div style="font-size:.71rem;color:var(--t3);">'+(e.type==='add_to_cart'?e.data.name+' — £'+(e.data.price||0).toFixed(2):e.type==='purchase'?'£'+(e.data.total||0).toFixed(2)+' · '+(e.data.items||0)+' item(s)'+(e.data.isGuest?' [guest]':''):e.type==='search'?'"'+e.data.query+'"':e.type==='page_view'?e.data.page:e.type==='cookie_consent'?e.data.level:'')+'</div></div><div style="font-size:.69rem;color:var(--t3);white-space:nowrap;">'+new Date(e.ts).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'})+'</div></div>').join(''):'<div style="color:var(--t3);font-size:.8rem;">No events yet. Browse the shop!</div>';
  const el=document.getElementById('ats');if(el)el.textContent='Updated '+new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
go();
</script>
</body>
</html>
