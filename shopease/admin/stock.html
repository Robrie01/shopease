<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ShopEase Admin — Inventory</title>
<link rel="stylesheet" href="../css/global.css">
<link rel="stylesheet" href="../css/components.css">
</head>
<body>
<div id="toasts"></div>
<div id="topnav"></div>
<div class="wrap">
<div id="sidebar"></div>
<main class="main">
  <div class="sec-hdr">
    <div class="page-title" style="margin:0;">Inventory</div>
    <button class="btn btn-grn btn-sm" onclick="openAdd()">+ Add Product</button>
  </div>
  <div style="background:var(--adim);border:1px solid rgba(79,126,247,.18);border-radius:var(--r2);padding:9px 13px;font-size:.78rem;color:var(--t2);margin-bottom:14px;">Changes apply live — customers see updated stock immediately. Removing a product clears it from all carts.</div>
  <div style="background:var(--card);border:1px solid var(--border);border-radius:var(--r3);overflow:hidden;">
    <table class="dtbl"><thead><tr><th></th><th>Product</th><th>Category</th><th>Price</th><th>Stock</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody id="sb"></tbody></table>
  </div>
</main>
</div>

<!-- ADD / EDIT MODAL -->
<div class="mov hidden" id="addmod">
  <div class="modal" onclick="event.stopPropagation()" style="max-width:480px;width:92vw;">
    <div class="mhdr"><h3 id="mod-title">Add Product</h3><button class="mclose" onclick="closeAdd()">&#x2715;</button></div>
    <div class="field"><label>Product Name<span class="req">*</span></label><input type="text" id="nn" placeholder="e.g. Bluetooth Speaker"></div>

    <!-- IMAGE UPLOAD -->
    <div class="field">
      <label>Product Image <span style="color:var(--t3);font-size:.68rem;">(optional — replaces emoji icon on storefront)</span></label>
      <div id="img-cur" style="display:none;margin-bottom:8px;position:relative;">
        <img id="img-preview" src="" alt="Current image" style="width:100%;max-height:140px;object-fit:contain;border-radius:var(--r2);background:rgba(255,255,255,.04);border:1px solid var(--border2);">
        <button onclick="clearImg()" style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,.55);border:none;border-radius:50%;width:22px;height:22px;color:#fff;cursor:pointer;font-size:.75rem;display:flex;align-items:center;justify-content:center;">&#x2715;</button>
      </div>
      <label id="img-lbl" style="display:flex;align-items:center;gap:10px;padding:10px 13px;border:1px dashed var(--border2);border-radius:var(--r2);cursor:pointer;color:var(--t2);font-size:.8rem;font-weight:400;margin:0;transition:border .15s;" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border2)'">
        <span style="font-size:1.2rem;">🖼</span>
        <span id="img-lbl-txt">Click to upload image (JPG, PNG, WebP · max 2 MB)</span>
        <input type="file" id="ni" accept="image/jpeg,image/png,image/webp" style="display:none;" onchange="previewImg(this)">
      </label>
      <div id="img-uploading" style="display:none;font-size:.75rem;color:var(--accent);margin-top:5px;">⟳ Uploading...</div>
    </div>

    <div class="field"><label>Emoji Icon <span style="color:var(--t3);font-size:.68rem;">(shown when no image is set)</span></label><div class="epick" id="ep"></div></div>
    <div class="g2">
      <div class="field"><label>Price (£)<span class="req">*</span></label><div class="iw"><span class="ipfx">£</span><input type="number" id="np" class="hpfx" placeholder="0.00" step="0.01" min="0.01"></div></div>
      <div class="field"><label>Initial Stock<span class="req">*</span></label><input type="number" id="ns" placeholder="50" min="0"></div>
    </div>
    <div class="field"><label>Category</label><select id="nc"><option>Electronics</option><option>Fashion</option><option>Home</option><option>Fitness</option><option>Other</option></select></div>
    <div class="mfoot">
      <button class="btn btn-grn" id="mod-save-btn" onclick="saveP()" style="background:var(--green);color:#fff;">Add Product</button>
      <button class="btn btn-g" onclick="closeAdd()">Cancel</button>
    </div>
  </div>
</div>

<script src="../js/state.js"></script>
<script src="../js/nav.js"></script>
<script>
const API='https://shopease-api-bjdvcybfd9aga0h6.canadacentral-01.azurewebsites.net/api';
const _u=Nav.init({page:'stock',adminOnly:true});
State.syncProds().then(render);

const EMOJIS='🎧👟☕🧘💻💧💡🎒⌚🏋🕯🕶📱🖥⌨🖱📷🎮🎵📚🧴👜👒🌂🏀⚽🎸🍕🍷🧃🌿🧸🎁💎🪴🕹🎨'.split('');
let selE='📦', selImg=null, editMode=false, editId=null;

function stag(s){if(s===0)return'<span class="stag sout">Out of stock</span>';if(s<=5)return'<span class="stag slow">Only '+s+' left</span>';return'<span class="stag sin">In stock</span>';}

function thumb(p){
  if(p.image)return'<img src="'+p.image+'" style="width:36px;height:36px;object-fit:contain;border-radius:6px;background:rgba(255,255,255,.05);" alt="'+p.name+'">';
  return'<span style="font-size:1.45rem;">'+p.emoji+'</span>';
}

function render(){
  document.getElementById('sb').innerHTML=State.getProds().map(p=>'<tr>'
    +'<td style="width:44px;">'+thumb(p)+'</td>'
    +'<td><strong>'+p.name+'</strong></td>'
    +'<td><span class="bdg bdg-b">'+p.cat+'</span></td>'
    +'<td style="color:var(--accent);font-weight:600;">£'+p.price.toFixed(2)+'</td>'
    +'<td><input class="sinp" type="number" value="'+p.stock+'" min="0" onchange="updS('+p.id+',this.value)"></td>'
    +'<td>'+stag(p.stock)+'</td>'
    +'<td style="display:flex;gap:6px;"><button class="btn btn-d btn-sm" onclick="openEdit('+p.id+')">Edit</button><button class="btn btn-r btn-sm" onclick="rmP('+p.id+')">Remove</button></td>'
    +'</tr>').join('');
}

function updS(id,val){
  const prods=State.getProds(),p=prods.find(x=>x.id===id);
  if(!p)return;
  p.stock=Math.max(0,parseInt(val)||0);
  State.setProds(prods);render();
  State.pushProds(_u.token);
  Nav.toast('Stock updated: '+p.name,'s');
}

function rmP(id){
  const p=State.getProds().find(x=>x.id===id);
  if(!confirm('Remove "'+p.name+'" from catalogue?'))return;
  State.setProds(State.getProds().filter(x=>x.id!==id));
  State.setCart(State.getCart().filter(x=>x.id!==id));
  State.pushProds(_u.token);
  render();Nav.toast(p.emoji+' '+p.name+' removed','i');
}

function buildEmojiPicker(){
  document.getElementById('ep').innerHTML=EMOJIS.map(e=>'<div class="eo'+(e===selE?' sel':'')+'" onclick="pe(\''+e+'\')" >'+e+'</div>').join('');
}

function openAdd(){
  editMode=false;editId=null;selE='📦';selImg=null;
  document.getElementById('nn').value='';
  document.getElementById('np').value='';
  document.getElementById('ns').value='';
  document.getElementById('nc').value='Electronics';
  document.getElementById('mod-title').textContent='Add Product';
  document.getElementById('mod-save-btn').textContent='Add Product';
  document.getElementById('img-cur').style.display='none';
  document.getElementById('img-lbl-txt').textContent='Click to upload image (JPG, PNG, WebP · max 2 MB)';
  document.getElementById('ni').value='';
  buildEmojiPicker();
  document.getElementById('addmod').classList.remove('hidden');
}

function openEdit(id){
  const p=State.getProds().find(x=>x.id===id);if(!p)return;
  editMode=true;editId=id;selE=p.emoji||'📦';selImg=p.image||null;
  document.getElementById('nn').value=p.name;
  document.getElementById('np').value=p.price.toFixed(2);
  document.getElementById('ns').value=p.stock;
  document.getElementById('nc').value=p.cat;
  document.getElementById('mod-title').textContent='Edit Product';
  document.getElementById('mod-save-btn').textContent='Save Changes';
  document.getElementById('ni').value='';
  if(p.image){
    document.getElementById('img-preview').src=p.image;
    document.getElementById('img-cur').style.display='block';
    document.getElementById('img-lbl-txt').textContent='Click to replace image';
  } else {
    document.getElementById('img-cur').style.display='none';
    document.getElementById('img-lbl-txt').textContent='Click to upload image (JPG, PNG, WebP · max 2 MB)';
  }
  buildEmojiPicker();
  document.getElementById('addmod').classList.remove('hidden');
}

function closeAdd(){document.getElementById('addmod').classList.add('hidden');}

function pe(e){selE=e;document.querySelectorAll('.eo').forEach(el=>el.classList.toggle('sel',el.textContent===e));}

function clearImg(){
  selImg=null;
  document.getElementById('img-cur').style.display='none';
  document.getElementById('ni').value='';
  document.getElementById('img-lbl-txt').textContent='Click to upload image (JPG, PNG, WebP · max 2 MB)';
}

async function previewImg(input){
  const file=input.files[0];
  if(!file)return;
  if(file.size>2*1024*1024){Nav.toast('Image must be under 2 MB','e');input.value='';return;}
  // Show local preview immediately
  const reader=new FileReader();
  reader.onload=async()=>{
    document.getElementById('img-preview').src=reader.result;
    document.getElementById('img-cur').style.display='block';
    document.getElementById('img-lbl-txt').textContent=file.name;
    // Upload to Azure Blob via API
    document.getElementById('img-uploading').style.display='block';
    const base64=reader.result.split(',')[1];
    const user=State.getUser();
    try{
      const res=await fetch(API+'/upload-image',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({token:user.token||'',filename:file.name,contentType:file.type,data:base64})
      });
      const d=await res.json();
      if(res.ok){selImg=d.url;Nav.toast('Image uploaded','s');}
      else{Nav.toast('Upload failed: '+(d.error||res.status),'e');clearImg();}
    }catch(e){Nav.toast('Upload failed: '+e.message,'e');clearImg();}
    document.getElementById('img-uploading').style.display='none';
  };
  reader.readAsDataURL(file);
}

function saveP(){
  const name=document.getElementById('nn').value.trim();
  const price=parseFloat(document.getElementById('np').value);
  const stock=parseInt(document.getElementById('ns').value)||0;
  const cat=document.getElementById('nc').value;
  if(!name||isNaN(price)||price<=0){Nav.toast('Please fill all required fields.','e');return;}
  const prods=State.getProds();
  if(editMode){
    const p=prods.find(x=>x.id===editId);
    if(!p)return;
    p.name=name;p.price=price;p.stock=stock;p.cat=cat;p.emoji=selE;
    if(selImg)p.image=selImg;else delete p.image;
    State.setProds(prods);State.pushProds(_u.token);closeAdd();render();Nav.toast(name+' updated','s');
  } else {
    const newP={id:Math.max(...prods.map(p=>p.id),200)+1,name,emoji:selE,price,cat,stars:4.0,reviews:0,stock};
    if(selImg)newP.image=selImg;
    prods.push(newP);State.setProds(prods);State.pushProds(_u.token);closeAdd();render();Nav.toast(selE+' '+name+' added!','s');
  }
}

render();
</script>
</body>
</html>
