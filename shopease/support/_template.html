<!-- shared styles used by all support topic pages -->
<style>
.sup-back{display:inline-flex;align-items:center;gap:7px;font-size:.78rem;color:var(--t2);margin-bottom:20px;cursor:pointer;transition:color .14s;}
.sup-back:hover{color:var(--accent);}
.faq-item{background:var(--card);border:1px solid var(--border);border-radius:var(--r3);margin-bottom:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.faq-q{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;cursor:pointer;font-size:.87rem;font-weight:600;color:var(--text);transition:background .14s;user-select:none;}
.faq-q:hover{background:var(--card2);}
.faq-arr{transition:transform .2s;color:var(--t3);font-size:.8rem;}
.faq-item.open .faq-arr{transform:rotate(90deg);}
.faq-a{display:none;padding:0 18px 16px;font-size:.82rem;color:var(--t2);line-height:1.8;border-top:1px solid var(--border);}
.faq-a p{margin-bottom:8px;}.faq-a p:last-child{margin-bottom:0;}
.faq-a ul{margin:6px 0 8px 18px;}.faq-a ul li{margin-bottom:4px;}
.faq-item.open .faq-a{display:block;}
.topic-hero{display:flex;align-items:center;gap:14px;background:var(--adim);border:1px solid rgba(79,126,247,.15);border-radius:var(--r3);padding:18px 20px;margin-bottom:24px;}
.topic-hero-icon{font-size:1.8rem;}
.topic-hero h2{font-size:1.05rem;font-weight:700;color:var(--text);margin-bottom:2px;}
.topic-hero p{font-size:.78rem;color:var(--t2);}
</style>
<script>
function tog(el){el.closest('.faq-item').classList.toggle('open');}
</script>
